<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Job Bunny logo — a lavender bunny holding a magnifying glass">
  <!-- backdrop -->
  <circle cx="120" cy="120" r="116" fill="#EDE7FB"/>
  <circle cx="120" cy="120" r="116" fill="none" stroke="#D9C7F2" stroke-width="3"/>

  <!-- ears -->
  <g transform="rotate(-13 104 92)">
    <ellipse cx="104" cy="70" rx="17" ry="52" fill="#B6A0E0"/>
    <ellipse cx="104" cy="74" rx="8" ry="38" fill="#E9B8DD"/>
  </g>
  <g transform="rotate(13 140 92)">
    <ellipse cx="140" cy="70" rx="17" ry="52" fill="#B6A0E0"/>
    <ellipse cx="140" cy="74" rx="8" ry="38" fill="#E9B8DD"/>
  </g>

  <!-- head / body -->
  <ellipse cx="122" cy="150" rx="62" ry="56" fill="#B6A0E0"/>

  <!-- cheeks -->
  <circle cx="88" cy="161" r="10" fill="#E9B8DD" opacity="0.7"/>
  <circle cx="156" cy="161" r="10" fill="#E9B8DD" opacity="0.7"/>

  <!-- whiskers -->
  <g stroke="#CDBBEF" stroke-width="2.4" stroke-linecap="round">
    <line x1="96" y1="160" x2="64" y2="154"/>
    <line x1="96" y1="166" x2="64" y2="170"/>
    <line x1="148" y1="160" x2="180" y2="154"/>
    <line x1="148" y1="166" x2="180" y2="170"/>
  </g>

  <!-- eyes -->
  <ellipse cx="104" cy="146" rx="7.5" ry="9.5" fill="#3F3360"/>
  <ellipse cx="140" cy="146" rx="7.5" ry="9.5" fill="#3F3360"/>
  <circle cx="106.5" cy="142.5" r="2.6" fill="#FFFFFF"/>
  <circle cx="142.5" cy="142.5" r="2.6" fill="#FFFFFF"/>

  <!-- nose + mouth -->
  <path d="M115 157 H129 L122 165 Z" fill="#9B6FC4"/>
  <path d="M122 165 q-6 8 -13 3 M122 165 q6 8 13 3" stroke="#6A4C93" stroke-width="2.4" fill="none" stroke-linecap="round"/>

  <!-- paw holding the magnifier -->
  <ellipse cx="162" cy="194" rx="14" ry="11" fill="#A98FD9"/>

  <!-- magnifying glass (the job hunt) -->
  <line x1="190" y1="200" x2="208" y2="218" stroke="#6A4C93" stroke-width="8" stroke-linecap="round"/>
  <circle cx="178" cy="187" r="18" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="178" cy="187" r="18" fill="none" stroke="#6A4C93" stroke-width="6"/>
  <path d="M170 181 q4 -5 11 -3" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
</svg>
